<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Night Room</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="not-found">
  <h1>404</h1>
  <h3>Not Found</h3>
  <p>the resource requested could not be found on this server</p>
</div>

<div id="log-ship">
  <input class="c-trans" type="text" placeholder="Log Ship Name">
  <button class="send">Log Ship</button>
</div>

<canvas id="stars"></canvas>

<main id="content">
  <img id="moon" src="./images/moon.webp" alt="">
  <img id="earth" src="./images/earth.webp" alt="">
  <img id="mars" src="./images/mars.webp" alt="">

  <div class="star-tooltip" id="star-tooltip">
    <button id="close">
    <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="20" x2="80" y2="80" stroke="currentColor" stroke-width="15" stroke-linecap="round"/>
      <line x1="80" y1="20" x2="20" y2="80" stroke="currentColor" stroke-width="15" stroke-linecap="round"/>
    </svg>
    </button>
    <h2 class="star-name"></h2>
    <div class="star-details"></div>
  </div>

  <section id="interface">
    <div class="uplink"><p>DEEP SPACE UPLINK</p></div>

  <div id="input-field">
  <div class="input-wrap" id="wrap-message">
    <div class="scan-bar"></div>
    <div class="bracket tl"></div><div class="bracket tr"></div>
    <div class="bracket bl"></div><div class="bracket br"></div>
    <input class="c-trans" id="message" name="send-message" type="text" placeholder="enter message here">
  </div>

  <button class="send" id="transmit">transmit</button>
</div>

  <div id="header">
    <p id="ship-name"></p>
    <p id="time"></p>  
  </div>
  </section>

</main>

<script src="./script.js"></script>
</body>
</html>
