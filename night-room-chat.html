<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Night Room</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<canvas id="stars"></canvas>
<img id="moon" src="./images/moon.webp" alt="">
<img id="earth" src="./images/earth.webp" alt="">
<img id="mars" src="./images/mars.webp" alt=""">

<header >
  <h1 id="header-title">The Night Room</h1>
  <p id="time">time</p>  
</header>

<main>

  <section id="messages"></section>

  <div id="input-field">
    <input class="c-trans" id="enter-name"  name="enter-name" type="text" placeholder="Name">
    <input class="c-trans" id="message"  name="send-message" type="text" placeholder="enter message here">
    <button class="c-trans" id="send" >Send</button>
  </div>
</main>

<script src="./script.js"></script>
</body>
</html>
